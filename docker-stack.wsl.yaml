version: '3.8'

# ============================================
# Docker Swarm 部署配置 - WSL 环境优化版
# ============================================
# 适用于: Windows WSL2 + Docker Desktop
# 特点:
#   1. 使用 docker volume 代替 bind mount
#   2. 简化网络配置
#   3. 降低资源限制
#   4. 移除 placement constraints（单节点）

secrets:
  postgres_password:
    external: true
    name: autotest_postgres_password

  secret_key:
    external: true
    name: autotest_secret_key

services:
  # ============================================
  # 数据库服务
  # ============================================
  postgres:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: autotest_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: autotest_platform
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pg.sh:/docker-entrypoint-initdb.d/init-pg.sh
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotest_user -d autotest_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    deploy:
      mode: replicated
      replicas: 1
      # WSL 单节点，移除 placement constraints
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================
  # Redis服务
  # ============================================
  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ============================================
  # API服务
  # ============================================
  api:
    image: ${DOCKER_REGISTRY:-}autotest-platform:${IMAGE_TAG:-latest}
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=autotest_user
      - DATABASE_NAME=autotest_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_CACHE=0
      - REDIS_DB_CELERY_BROKER=1
      - REDIS_DB_CELERY_BACKEND=2
      - ENVIRONMENT=prod
      - DEBUG=false
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - logs:/app/logs
      - output:/app/output
    networks:
      - autotest-network
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    deploy:
      mode: replicated
      replicas: 1
      # WSL 单节点，只运行 1 个副本
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # ============================================
  # Celery Worker服务
  # ============================================
  celery-worker:
    image: ${DOCKER_REGISTRY:-}autotest-platform:${IMAGE_TAG:-latest}
    # 使用启动脚本进行依赖检查和优雅关闭
    command: [ "/bin/bash", "/app/scripts/start_celery_worker.sh", "--concurrency=2", "--max-tasks-per-child=100" ]
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=autotest_user
      - DATABASE_NAME=autotest_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_CACHE=0
      - REDIS_DB_CELERY_BROKER=1
      - REDIS_DB_CELERY_BACKEND=2
      - ENVIRONMENT=prod
      - DEBUG=false
      - CELERY_WORKER_CONCURRENCY=2
      - CELERY_LOG_LEVEL=info
      - CELERY_MAX_TASKS_PER_CHILD=100
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - logs:/app/logs
      - output:/app/output
    networks:
      - autotest-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: [ "CMD", "python3", "/app/scripts/healthcheck_celery.py" ]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5
        window: 300s

  # ============================================
  # Celery Beat服务
  # ============================================
  celery-beat:
    image: ${DOCKER_REGISTRY:-}autotest-platform:${IMAGE_TAG:-latest}
    # 使用启动脚本进行依赖检查和优雅关闭
    command: [ "/bin/bash", "/app/scripts/start_celery_beat.sh" ]
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=autotest_user
      - DATABASE_NAME=autotest_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_CACHE=0
      - REDIS_DB_CELERY_BROKER=1
      - REDIS_DB_CELERY_BACKEND=2
      - ENVIRONMENT=prod
      - DEBUG=false
      - CELERY_LOG_LEVEL=info
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - logs:/app/logs
      - celerybeat_data:/app/data/celerybeat
    networks:
      - autotest-network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: [ "CMD", "test", "-f", "/app/data/celerybeat/celerybeat.pid" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5
        window: 300s

networks:
  autotest-network:
    driver: overlay
    attachable: true


volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local
  output:
    driver: local
  celerybeat_data:
    driver: local
