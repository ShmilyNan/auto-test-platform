version: '3.8'

# ============================================
# Docker Swarm 部署配置 - WSL 环境优化版
# ============================================
# 适用于: Windows WSL2 + Docker Desktop
# 特点:
#   1. 使用 docker volume 代替 bind mount
#   2. 简化网络配置
#   3. 降低资源限制
#   4. 移除 placement constraints（单节点）

secrets:
  postgres_password:
    external: true
    name: autotest_postgres_password

  secret_key:
    external: true
    name: autotest_secret_key

services:
  # ============================================
  # 数据库服务
  # ============================================
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: autotest_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: autotest_platform
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-pg.sh:/docker-entrypoint-initdb.d/init-pg.sh
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotest_user -d autotest_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    deploy:
      mode: replicated
      replicas: 1
      # WSL 单节点，移除 placement constraints
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================
  # Redis服务
  # ============================================
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "6379:6379"
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ============================================
  # API服务
  # ============================================
  api:
    image: ${DOCKER_REGISTRY:-}autotest-platform:${IMAGE_TAG:-latest}
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - DATABASE_HOST=localhost
      - DATABASE_PORT=5432
      - DATABASE_USER=autotest_user
      - DATABASE_NAME=autotest_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_CACHE=0
      - REDIS_DB_CELERY_BROKER=1
      - REDIS_DB_CELERY_BACKEND=2
      - ENVIRONMENT=production
      - DEBUG=false
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - logs:/app/logs
      - output:/app/output
    networks:
      - autotest-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    deploy:
      mode: replicated
      replicas: 1
      # WSL 单节点，只运行 1 个副本
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3

  # ============================================
  # Celery Worker服务
  # ============================================
  celery-worker:
    image: ${DOCKER_REGISTRY:-}autotest-platform:${IMAGE_TAG:-latest}
    command: celery -A scheduler worker --loglevel=info --concurrency=2
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - DATABASE_HOST=localhost
      - DATABASE_PORT=5432
      - DATABASE_USER=autotest_user
      - DATABASE_NAME=autotest_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_CACHE=0
      - REDIS_DB_CELERY_BROKER=1
      - REDIS_DB_CELERY_BACKEND=2
      - ENVIRONMENT=production
      - DEBUG=false
      - CELERY_WORKER_CONCURRENCY=2
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - logs:/app/logs
      - output:/app/output
    networks:
      - autotest-network
    depends_on:
      - postgres
      - redis
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ============================================
  # Celery Beat服务
  # ============================================
  celery-beat:
    image: ${DOCKER_REGISTRY:-}autotest-platform:${IMAGE_TAG:-latest}
    command: celery -A scheduler beat --loglevel=info
    environment:
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - DATABASE_HOST=localhost
      - DATABASE_PORT=5432
      - DATABASE_USER=autotest_user
      - DATABASE_NAME=autotest_platform
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB_CACHE=0
      - REDIS_DB_CELERY_BROKER=1
      - REDIS_DB_CELERY_BACKEND=2
      - ENVIRONMENT=production
      - DEBUG=false
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - logs:/app/logs
    networks:
      - autotest-network
    depends_on:
      - postgres
      - redis
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

networks:
  autotest-network:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  logs:
    driver: local
  output:
    driver: local
