services:
  # ============================================
  # 数据库服务
  # ============================================
  postgres:
    image: postgres
#    container_name: autotest-postgres
    environment:
      POSTGRES_USER: autotest_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: autotest_platform
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autotest_user -d autotest_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autotest-network
    restart: unless-stopped

  # ============================================
  # Redis服务
  # ============================================
  redis:
    image: redis
#    container_name: autotest-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autotest-network
    restart: unless-stopped

  # ============================================
  # API服务
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
#    container_name: autotest-api
    environment:
      - DATABASE_URL=postgresql+asyncpg://autotest_user:@postgres:5432/autotest_platform
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - ./logs:/app/logs
      - ./storage:/app/storage
      - allure_results_dir:/app/reports/allure
      - allure_report_dir:/app/reports/allure-report
    secrets:
      - postgres_password
      - secret_key
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - autotest-network
    restart: unless-stopped

  # ============================================
  # Celery Worker服务
  # ============================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
#    container_name: autotest-celery-worker
    command: celery -A scheduler worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql+asyncpg://autotest_user:@postgres:5432/autotest_platform
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - ENVIRONMENT=production
      - DEBUG=false
      - SECRET_KEY_FILE=/run/secrets/secret_key
    secrets:
      - postgres_password
      - secret_key
    volumes:
      - ./logs:/app/logs
      - allure_results_dir:/app/reports/allure
      - allure_report_dir:/app/reports/allure-report
    depends_on:
      - postgres
      - redis
    networks:
      - autotest-network
    restart: unless-stopped

  # ============================================
  # Celery Beat服务（定时任务调度）
  # ============================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
#    container_name: autotest-celery-beat
    command: celery -A scheduler beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://autotest_user:@postgres:5432/autotest_platform
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - ENVIRONMENT=production
      - DEBUG=false
    volumes:
      - ./logs:/app/logs
    secrets:
      - postgres_password
      - secret_key
    depends_on:
      - postgres
      - redis
    networks:
      - autotest-network
    restart: unless-stopped

  # ============================================
  # Nginx反向代理（可选，用于生产环境）
  # ============================================
  nginx:
    image: nginx
#    container_name: autotest-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - autotest-network
    restart: unless-stopped
#    profiles:
#      - production

# ============================================
# 网络配置
# ============================================
networks:
  autotest-network:
    driver: bridge

# ============================================
# 数据卷配置
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  allure_results_dir:
    driver: local
  allure_report_dir:
    driver: local

secrets:
  postgres_password:
    external: true
  secret_key:
    external: true
